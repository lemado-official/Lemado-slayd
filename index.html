<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lemado</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        /* ASOSIY STILLAR */
        :root {
            --yt-blue: #065fd4;
            --yt-red: #ff0000;
            --bg-black: #0f0f0f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-black);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* YOUTUBE PLEER RAMKASI (16:9 FORMAT) */
        .player-container {
            position: relative;
            width: 90%;
            max-width: 1200px;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 
                        0 0 30px rgba(6, 95, 212, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .swiper {
            width: 100%;
            height: 100%;
        }

        .swiper-slide {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .swiper-slide-active img {
            opacity: 1;
        }

        /* NAVIGATSIYA TUGMALARI */
        .swiper-button-next, .swiper-button-prev {
            color: #ffffff !important;
            background: rgba(0, 0, 0, 0.6);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            opacity: 0;
            transition: all 0.2s ease;
        }

        .swiper-button-next:after, .swiper-button-prev:after {
            font-size: 20px !important;
            font-weight: bold;
        }

        .player-container:hover .swiper-button-next,
        .player-container:hover .swiper-button-prev {
            opacity: 1;
        }

        .swiper-button-next:hover, .swiper-button-prev:hover {
            background: rgba(255, 0, 0, 0.8);
            transform: scale(1.1);
        }

        /* PROGRESS BAR (PASTDAGI CHIZIQ) */
        .swiper-pagination-progressbar {
            background: rgba(255, 255, 255, 0.2) !important;
            height: 4px !important;
            top: auto !important;
            bottom: 0 !important;
        }

        .swiper-pagination-progressbar-fill {
            background: linear-gradient(90deg, var(--yt-blue), var(--yt-red)) !important;
        }

        /* ALBOM REJIMIDA TO'LIQ EKRAN */
        @media (max-width: 900px) and (orientation: landscape) {
            body {
                padding: 0;
                background: #000;
            }
            .player-container {
                width: 100vw;
                height: 100vh;
                max-width: none;
                border-radius: 0;
                border: none;
                aspect-ratio: auto;
            }
        }

        @media (max-width: 768px) and (orientation: portrait) {
            .player-container {
                width: 95%;
                border-radius: 8px;
            }
            .swiper-button-next, .swiper-button-prev {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="player-container">
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                
                <div class="swiper-slide">
                    <img src="https://www.dropbox.com/scl/fi/di3teksqma1zliv0ajgez/file_00000000109c720aa9d126c5a30410e5.png?rlkey=lv29olajgqiju5xrdhtsfoncj&st=8m9tm9hc&raw=1" alt="Slayd 1">
                </div>

                <div class="swiper-slide">
                    <img src="https://www.dropbox.com/scl/fi/257hbgqzurvth0wbtlx4h/file_000000009f7c72468acdaa96dd310b6a.png?rlkey=xn9qjcvdjyj411u4mn9a4t4kq&st=bi0c1s84&raw=1" alt="Slayd 2">
                </div>

                <div class="swiper-slide">
                    <img src="https://www.dropbox.com/scl/fi/wfy3dc5m17l79qzj77f66/file_00000000cbfc7243ad0c9514af755199.png?rlkey=vag8461z8wxa6o3xstvpjrrdz&st=q7o6k0va&raw=1" alt="Slayd 3">
                </div>

                <div class="swiper-slide">
                    <img src="https://www.dropbox.com/scl/fi/r6kmd9m9vk4gj9d4xb82p/file_00000000501c7243b8033978b2c51b7a.png?rlkey=lohpapd1zracb0vhpax21szny&st=f9fu6um4&raw=1" alt="Slayd 4">
                </div>

                <div class="swiper-slide">
                    <img src="https://www.dropbox.com/scl/fi/1b6bwfqngnunudozmdh5o/file_000000008b8471f4b4d6962dd92389d0.png?rlkey=ljatzvrunflb2hqt47i1d6074&st=3j5fzoq2&raw=1" alt="Slayd 5">
                </div>

                <div class="swiper-slide">
                    <img src="https://www.dropbox.com/scl/fi/i89i6g0rmnz5sy49p9mgy/file_000000007c4471f4a92faf0093c81241.png?rlkey=m6dmk73tfmt50kjm3dq0r0hcy&st=xiekdzgq&raw=1" alt="Slayd 6">
                </div>

                <div class="swiper-slide">
                    <img src="https://www.dropbox.com/scl/fi/7jlq7e3gc5cj36dmt92bk/file_00000000c6cc720aa7ae4f2d3ab3d159.png?rlkey=pxhg3zaehd5d7rlu8ys7g4m9f&st=dfkctvlb&raw=1" alt="Slayd 7">
                </div>

                <div class="swiper-slide">
                    <img src="https://www.dropbox.com/scl/fi/qv00kt4yft8so7xx8fb2g/file_00000000b66c720abbb312faebda89d1.png?rlkey=1m7rth1l0nckll1to6elh7r8t&st=1ful95vt&raw=1" alt="Slayd 8">
                </div>

                <div class="swiper-slide">
                    <img src="https://www.dropbox.com/scl/fi/s4gyo4cidk3zwzatxl9cc/file_0000000030e0720abf25f366b12c06d0.png?rlkey=pfuqcat51j5t6ep7zd83yfiqq&st=ortzmq2a&raw=1" alt="Slayd 9">
                </div>

                <div class="swiper-slide">
                    <img src="https://www.dropbox.com/scl/fi/npbjad8xr6bxkhf2eqrf5/file_000000005ac8720a9fc448da9d4c9743.png?rlkey=69awf9bcnjh9py67e6igaa0m1&st=z3a249mq&raw=1" alt="Slayd 10">
                </div>

                <div class="swiper-slide">
                    <img src="https://www.dropbox.com/scl/fi/vj6mf8c5twwwysxm82d5g/file_00000000c79471f4b7a6a089326e51f6.png?rlkey=ae7gx7vxn7qbsfin8s3pgrmuo&st=g4pr1nsl&raw=1" alt="Slayd 11">
                </div>

            </div>
            
            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
            <div class="swiper-pagination"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        var swiper = new Swiper(".mySwiper", {
            spaceBetween: 0,
            centeredSlides: true,
            effect: "slide", /* Silliq surilish effekti */
            keyboard: {
                enabled: true, /* Klaviaturadan boshqarish */
            },
            // Autoplay butunlay olib tashlandi
            pagination: {
                el: ".swiper-pagination",
                type: "progressbar",
            },
            navigation: {
                nextEl: ".swiper-button-next",
                prevEl: ".swiper-button-prev",
            },
        });
    </script>
</body>
</html>
